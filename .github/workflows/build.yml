name: Build CTRMapV

on:
  push:
    branches: [main, master, maven]
  pull_request:
    branches: [main, master, maven]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout CTRMapV
        uses: actions/checkout@v4
        with:
          path: CTRMapV

      - name: Checkout CTRMap-CE
        uses: actions/checkout@v4
        with:
          repository: PlatinumMaster/CTRMap-CE
          ref: maven
          path: CTRMap-CE
          submodules: recursive

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Set build metadata
        id: meta
        run: |
          DATE=$(date -u +'%Y%m%d')
          COMMIT=${GITHUB_SHA::7}
          if [[ "$GITHUB_REF" == "refs/heads/main" || "$GITHUB_REF" == "refs/heads/master" ]]; then
            TYPE=release
          else
            TYPE=dev
          fi
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT

      - name: Build CTRMap-CE
        run: cd CTRMap-CE && mvn install -B

      - name: Build CTRMapV
        run: cd CTRMapV && mvn package -B -Dbuild.date=${{ steps.meta.outputs.date }} -Dbuild.commit=${{ steps.meta.outputs.commit }} -Dbuild.type=${{ steps.meta.outputs.type }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CTRMapV
          path: CTRMapV/target/ctrmapv-*.jar
          if-no-files-found: warn

      - name: Create Nightly Release
        if: github.event_name == 'push' && github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd CTRMapV
          gh release delete nightly --yes 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true
          gh release create nightly \
            --title "Nightly ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.commit }})" \
            --notes "Dev build from \`${{ steps.meta.outputs.commit }}\` on $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --prerelease \
            target/ctrmapv-*.jar

      - name: Create Stable Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd CTRMapV
          TAG="stable-${{ steps.meta.outputs.date }}-${{ steps.meta.outputs.commit }}"
          gh release create "$TAG" \
            --title "Stable ${{ steps.meta.outputs.date }} (${{ steps.meta.outputs.commit }})" \
            --notes "Stable release from \`${{ steps.meta.outputs.commit }}\` on $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            target/ctrmapv-*.jar
